<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Proyecto-Rayan/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rayan - Gestión Estudiantil</title>
    <link rel="manifest" href="/Proyecto-Rayan/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rayan" />
    <link rel="apple-touch-icon" href="/Proyecto-Rayan/icon-512.png" />
    <meta name="description" content="Plataforma completa de gestión académica con horarios, tareas, calendario y más" />
    <script type="module" crossorigin src="/Proyecto-Rayan/index.js"></script>
    <link rel="stylesheet" crossorigin href="/Proyecto-Rayan/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
            .then(reg => console.log('✅ SW registrado:', reg.scope))
            .catch(err => console.log('SW error:', err));
        });
      }
    </script>
  </body>
</html>
