<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rayan - Gestión Estudiantil</title>
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rayan" />
    <link rel="apple-touch-icon" href="./icon-512.png" />
    <meta name="description" content="Plataforma completa de gestión académica con horarios, tareas, calendario y más" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=Instrument+Serif:ital@0;1&family=Quicksand:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Caveat:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      (function() {
        try {
          var f = localStorage.getItem('mb-app-font');
          if (f) {
            document.documentElement.style.setProperty('--app-font', f);
          }
        } catch(e) {}
      })();
    </script>
    <script type="module" crossorigin src="./index.js"></script>
    <link rel="stylesheet" crossorigin href="./index.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
            .then(reg => console.log('✅ SW registrado:', reg.scope))
            .catch(err => console.log('SW error:', err));
        });
      }
    </script>
  </body>
</html>
