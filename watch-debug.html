<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Debug</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: monospace;
            font-size: 10px;
            padding: 0.5rem;
            background: #000;
            color: #0f0;
            line-height: 1.3;
        }
        
        h1 {
            font-size: 12px;
            margin-bottom: 0.5rem;
            color: #0ff;
        }
        
        .info {
            margin-bottom: 0.5rem;
            padding: 0.3rem;
            background: #111;
            border-left: 2px solid #0f0;
        }
        
        .error {
            border-left-color: #f00;
            color: #f00;
        }
        
        .success {
            border-left-color: #0f0;
            color: #0f0;
        }
        
        button {
            width: 100%;
            padding: 0.5rem;
            margin-top: 0.5rem;
            background: #0f0;
            color: #000;
            border: none;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
        }
        
        button:active {
            background: #0a0;
        }
        
        #log {
            margin-top: 1rem;
            padding: 0.5rem;
            background: #111;
            max-height: 200px;
            overflow-y: auto;
            font-size: 9px;
        }
        
        .log-entry {
            margin-bottom: 0.2rem;
            padding: 0.2rem;
            border-left: 2px solid #666;
        }
    </style>
</head>
<body>
    <h1>🔍 WATCH DEBUG</h1>
    
    <div class="info">
        <strong>Pantalla:</strong> <span id="screenSize">...</span>
    </div>
    
    <div class="info">
        <strong>User Agent:</strong> <span id="userAgent">...</span>
    </div>
    
    <div class="info" id="smartwatchStatus">
        <strong>¿Es smartwatch?</strong> <span id="isSmartwatch">...</span>
    </div>
    
    <div class="info">
        <strong>localStorage:</strong> <span id="localStorageTest">...</span>
    </div>
    
    <div class="info">
        <strong>Viewport:</strong> <span id="viewport">...</span>
    </div>
    
    <button onclick="testLocalStorage()">Test localStorage</button>
    <button onclick="testNavigate()">Test Navigate</button>
    <button onclick="openMainApp()">Abrir App Principal</button>
    
    <div id="log">
        <strong>--- LOG ---</strong><br>
    </div>
    
    <script>
        const log = document.getElementById('log');
        
        function addLog(msg, isError = false) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.style.color = isError ? '#f00' : '#0f0';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
            console.log(msg);
        }
        
        // Info del dispositivo
        document.getElementById('screenSize').textContent = `${window.screen.width}x${window.screen.height}`;
        document.getElementById('userAgent').textContent = navigator.userAgent.substring(0, 50) + '...';
        document.getElementById('viewport').textContent = `${window.innerWidth}x${window.innerHeight}`;
        
        // Detección de smartwatch
        const width = window.screen.width;
        const height = window.screen.height;
        const isSmartwatch = width <= 450 && height <= 450;
        const isVerySmall = width < 300 || height < 300;
        
        document.getElementById('isSmartwatch').textContent = isSmartwatch || isVerySmall ? 'SÍ ✓' : 'NO';
        document.getElementById('smartwatchStatus').className = (isSmartwatch || isVerySmall) ? 'info success' : 'info error';
        
        addLog(`Iniciado en ${width}x${height}`);
        addLog(`Smartwatch: ${isSmartwatch || isVerySmall}`);
        
        // Test localStorage
        function testLocalStorage() {
            try {
                localStorage.setItem('test', 'hello');
                const value = localStorage.getItem('test');
                localStorage.removeItem('test');
                
                if (value === 'hello') {
                    document.getElementById('localStorageTest').textContent = 'OK ✓';
                    addLog('✅ localStorage funciona correctamente');
                } else {
                    throw new Error('Valor incorrecto');
                }
            } catch (e) {
                document.getElementById('localStorageTest').textContent = 'ERROR: ' + e.message;
                addLog('❌ localStorage error: ' + e.message, true);
            }
        }
        
        testLocalStorage();
        
        // Test navigate
        function testNavigate() {
            addLog('Probando navegación...');
            try {
                // Crear elementos de prueba
                const testDiv = document.createElement('div');
                testDiv.id = 'testPage';
                testDiv.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: blue; color: white; display: flex; align-items: center; justify-content: center; z-index: 10000;';
                testDiv.innerHTML = '<div style="text-align: center;"><h1>TEST OK</h1><button onclick="document.getElementById(\'testPage\').remove()">Cerrar</button></div>';
                document.body.appendChild(testDiv);
                
                addLog('✅ Navegación funciona');
                
                setTimeout(() => {
                    if (testDiv && testDiv.parentNode) {
                        testDiv.remove();
                    }
                }, 2000);
            } catch (e) {
                addLog('❌ Error en navegación: ' + e.message, true);
            }
        }
        
        // Abrir app principal
        function openMainApp() {
            addLog('Redirigiendo a app principal...');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);
        }
        
        // Touch events test
        let touchCount = 0;
        document.body.addEventListener('touchstart', () => {
            touchCount++;
            addLog(`Touch event #${touchCount}`);
        });
        
        addLog('Sistema de debug inicializado');
        addLog('Haz touch en cualquier parte para probar eventos');
    </script>
</body>
</html>
