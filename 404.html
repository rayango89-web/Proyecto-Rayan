<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mebistium</title>
  <script>
    // Si la URL contiene un token OAuth, redirigir a la app con el token
    var href = window.location.href;
    if (href.indexOf('access_token=') !== -1) {
      // Guardar el token en sessionStorage antes de redirigir
      var tokenMatch = href.match(/access_token=([^&]+)/);
      if (tokenMatch) {
        sessionStorage.setItem('classroom-token', tokenMatch[1]);
      }
      window.location.replace('./');
    } else {
      sessionStorage.redirect = href;
      window.location.replace('./');
    }
  </script>
</head>
<body></body>
</html>
